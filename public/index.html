<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arista 7050QX 后台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">LOCAL CONSOLE</p>
        <h1>Arista DCS-7050QX-32S-F</h1>
      </div>
      <div class="top-actions">
        <span id="connectionBadge" class="badge badge-neutral">本地模拟</span>
        <button id="refreshBtn" class="primary">刷新</button>
      </div>
    </header>

    <main class="layout">
      <section class="overview">
        <article class="metric">
          <span>主机名</span>
          <strong id="hostname">-</strong>
        </article>
        <article class="metric">
          <span>EOS</span>
          <strong id="eosVersion">-</strong>
        </article>
        <article class="metric">
          <span>转发能力</span>
          <strong>1.44 Bpps</strong>
        </article>
        <article class="metric">
          <span>交换容量</span>
          <strong>2.56 Tbps</strong>
        </article>
      </section>

      <section class="main-grid">
        <div class="panel port-panel">
          <div class="panel-title">
            <div>
              <h2>端口视图</h2>
              <p id="portSummary">36 ports</p>
            </div>
            <div class="legend">
              <span><i class="dot up"></i>Up</span>
              <span><i class="dot down"></i>Down</span>
              <span><i class="dot warn"></i>Error</span>
            </div>
          </div>
          <div id="portGrid" class="port-grid" aria-label="switch ports"></div>
        </div>

        <aside class="side-stack">
          <div class="panel health-panel">
            <div class="panel-title">
              <h2>设备健康</h2>
              <span id="lastRefresh" class="muted">-</span>
            </div>
            <div class="gauge-list">
              <div class="gauge-row">
                <span>CPU</span>
                <meter id="cpuMeter" min="0" max="100" value="0"></meter>
                <strong id="cpuValue">0%</strong>
              </div>
              <div class="gauge-row">
                <span>内存</span>
                <meter id="memoryMeter" min="0" max="100" value="0"></meter>
                <strong id="memoryValue">0%</strong>
              </div>
              <div class="gauge-row">
                <span>温度</span>
                <meter id="temperatureMeter" min="0" max="90" value="0"></meter>
                <strong id="temperatureValue">0C</strong>
              </div>
            </div>
            <div class="mini-status">
              <span>风扇 <b id="fanStatus">-</b></span>
              <span>电源 <b id="psuStatus">-</b></span>
            </div>
          </div>

          <div class="panel settings-panel">
            <div class="panel-title">
              <h2>连接</h2>
              <span id="modeHint" class="muted">SSH Console</span>
            </div>
            <form id="settingsForm" class="form-grid">
              <label>
                <span>启用真实设备</span>
                <input id="enabled" type="checkbox" />
              </label>
              <label>
                <span>连接方式</span>
                <select id="mode">
                  <option value="ssh">SSH Console</option>
                  <option value="eapi">Arista eAPI</option>
                </select>
              </label>
              <label id="protocolLabel">
                <span>eAPI 协议</span>
                <select id="protocol">
                  <option value="http">HTTP</option>
                  <option value="https">HTTPS</option>
                </select>
              </label>
              <label>
                <span>管理地址</span>
                <input id="host" type="text" placeholder="192.168.1.10" />
              </label>
              <label>
                <span>端口</span>
                <input id="port" type="number" min="1" max="65535" placeholder="22" />
              </label>
              <label>
                <span>用户名</span>
                <input id="username" type="text" autocomplete="username" />
              </label>
              <label>
                <span>密码</span>
                <input id="password" type="password" autocomplete="current-password" placeholder="留空保持不变" />
              </label>
              <button type="submit" class="primary full">保存连接</button>
            </form>
          </div>
        </aside>
      </section>

      <section class="bottom-grid">
        <div class="panel console-panel">
          <div class="panel-title">
            <h2>命令控制台</h2>
            <span class="muted">只读命令</span>
          </div>
          <form id="commandForm" class="command-form">
            <input id="commandInput" type="text" value="show interfaces status" />
            <button class="primary" type="submit">运行</button>
          </form>
          <pre id="commandOutput">等待命令...</pre>
        </div>

        <div class="panel events-panel">
          <div class="panel-title">
            <h2>事件</h2>
            <span class="muted">最近 50 条</span>
          </div>
          <ul id="eventList" class="event-list"></ul>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
